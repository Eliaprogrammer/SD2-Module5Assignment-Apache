<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CEN 4025C - Software Development 2</title>
<link rel="stylesheet" type="text/css" href="Animal.css">
</head>

<body>
<h1>Adorable Animals</h1>
<h3>List of animals I think are the best</h3>
	
<div class = "animals">
  <h4 id = "pandas">Pandas</h4>
  <h4 id = "dogs">Dogs</h4>
  <h4 id = "cats" >Cats</h4>
  <h4 id = "otters">Sea Otters</h4>
  <h4 id = "monkeys">Baby monkeys</h4>
  <h4 id = "turtles">Sea turtle</h4>
</div>

<p>Choice one:</p>
<div class="animalButtons">
   <button type="button" id="pandaButton">Pandas</button>
   <button type="button" id="dogButton">Dogs</button>
   <button type="button" id="catButton">Cats</button>
   <button type="button" id="otterButton">Sea Otters</button>
   <button type="button" id="monkeyButton">Monkeys</button>
   <button type="button" id="turtleButton">Sea Turtles</button>
</div>


<div class="pictures">
   <img id="pandaImage" src="panda.png" alt="Panda laying down" style="display: none;">
   <img id="dogImage" src="dogs.png" alt="Group of dogs" style="display: none;"/>
   <img id="catImage" src="cat.png" alt="Cat laying down" style="display: none;"/>
   <img id="otterImage" src="Sea Otters.png" alt="Group of sea otters in the water" style="display: none;"/>
   <img id="monkeyImage" src="Monkey.png" alt="Monkey holding a stuff monkey" style="display: none;"/>
   <img id="turtleImage" src="Sea Turtle.png" alt="Sea Turtle swimming in the ocean" style="display: none;"/>
</div>

<script src="AnimalPictures.js"></script>

</body>
</html>
